<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DANISH AI Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b1120;
  color:white;
}

header{
  background:#111827;
  padding:20px;
  text-align:center;
}

h1{
  color:#38bdf8;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.search-box{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input, textarea, select{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  transition:background 0.3s;
}

button:hover{
  background:#0ea5e9;
}

button:disabled{
  background:#94a3b8;
  cursor:not-allowed;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

pre{
  background:#111827;
  padding:15px;
  border-radius:10px;
  overflow:auto;
  max-height:300px;
}

.status{
  padding:10px;
  border-radius:8px;
  margin:10px 0;
  background:#0f172a;
}

.success{
  color:#22c55e;
}

.error{
  color:#ef4444;
}

.loading{
  color:#f59e0b;
}
</style>
</head>

<body>

<header>
<h1>🚀 DANISH AI Dashboard</h1>
<p>Search • Code • Translate • Knowledge Hub</p>
</header>

<div class="container">

<div class="search-box">
<input id="query" placeholder="Search DANISH AI...">
<button onclick="searchAI()">Search</button>
</div>

<div class="grid">

<div class="card">
<h3>🔍 Search</h3>
<textarea id="searchInput" rows="4" placeholder="Enter search query"></textarea>
<button onclick="searchAI()">Search</button>
</div>

<div class="card">
<h3>💻 Code Generator</h3>
<textarea id="prompt" rows="4" placeholder="Describe application..."></textarea>
<button onclick="generateCode()">Generate</button>
</div>

<div class="card">
<h3>🌐 Translator</h3>
<textarea id="translateInput" rows="4" placeholder="Enter text to translate..."></textarea>
<select id="targetLanguage" style="margin-bottom:10px;">
  <option value="es">Spanish</option>
  <option value="fr">French</option>
  <option value="de">German</option>
  <option value="ur">Urdu</option>
  <option value="zh">Chinese</option>
</select>
<button onclick="translateText()">Translate</button>
</div>

<div class="card">
<h3>📚 Knowledge Query</h3>
<textarea id="knowledgeInput" rows="4" placeholder="Ask DANISH AI..."></textarea>
<button onclick="knowledgeQuery()">Ask</button>
</div>

<div class="card">
<h3>⚙️ System Status</h3>
<p>Check server health and status</p>
<button onclick="systemStatus()">Check Status</button>
</div>

</div>

<h2>📊 Output</h2>
<div class="status" id="statusBox">Waiting for input...</div>
<pre id="output">Ready...</pre>

</div>

<script>

const API="http://localhost:3000";
const USE_MOCK_DATA=true;

// Mock Data Responses
const mockResponses={
  search:(query)=>({
    status:"success",
    query:query,
    results:[
      {title:"Result 1: "+query,url:"https://example.com/1",relevance:0.95},
      {title:"Result 2: "+query,url:"https://example.com/2",relevance:0.87},
      {title:"Result 3: "+query,url:"https://example.com/3",relevance:0.78}
    ],
    totalResults:3,
    executionTime:"0.234s"
  }),
  code:(prompt)=>({
    status:"success",
    prompt:prompt,
    language:"javascript",
    code:`// Generated code for: ${prompt}\n\nfunction myFunction() {\n  console.log("Hello from DANISH AI");\n  // Your implementation here\n  return true;\n}`,
    explanation:"This is a starter template for your application. Modify according to your needs."
  }),
  translate:(text,language)=>({
    status:"success",
    original:text,
    targetLanguage:language,
    translated:"[Translation of your text in "+language+"]",
    confidence:0.92
  }),
  knowledge:(query)=>({
    status:"success",
    query:query,
    answer:"DANISH AI Knowledge Base Result:\n\nThis is a comprehensive answer to your question based on the knowledge base. The system has processed your query and provided relevant information.",
    sources:["Source 1","Source 2","Source 3"],
    confidence:0.88
  }),
  status:()=>({
    status:"operational",
    version:"1.0.0",
    timestamp:new Date().toISOString(),
    services:{
      search:"✓ Running",
      codeGen:"✓ Running",
      translator:"✓ Running",
      knowledge:"✓ Running"
    },
    uptime:"99.9%",
    responsetime:"< 500ms"
  })
};

// Simulate API call with fallback to mock data
async function apiCall(endpoint,data){
  try{
    const response=await fetch(API+endpoint,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data),
      timeout:3000
    });
    return await response.json();
  }catch(err){
    console.log("Using mock data (Server not available)");
    return null;
  }
}

async function searchAI(){
  const query = document.getElementById("searchInput").value || document.getElementById("query").value;
  if(!query.trim()) {
    updateStatus("error","Please enter a search query");
    return;
  }
  updateStatus("loading","Searching...");
  try{
    let data = await apiCall("/api/search",{query:query});
    if(!data) data = mockResponses.search(query);
    
    updateStatus("success","✓ Search completed");
    updateOutput(data);
  }catch(err){
    updateStatus("error","✗ Error: "+err.message);
    updateOutput({error:err.message});
  }
}

async function generateCode(){
  const prompt = document.getElementById("prompt").value;
  if(!prompt.trim()) {
    updateStatus("error","Please enter a description");
    return;
  }
  updateStatus("loading","Generating code...");
  try{
    let data = await apiCall("/api/code/generate",{prompt:prompt});
    if(!data) data = mockResponses.code(prompt);
    
    updateStatus("success","✓ Code generated");
    updateOutput(data);
  }catch(err){
    updateStatus("error","✗ Error: "+err.message);
    updateOutput({error:err.message});
  }
}

async function translateText(){
  const text = document.getElementById("translateInput").value;
  const language = document.getElementById("targetLanguage").value;
  
  if(!text.trim()) {
    updateStatus("error","Please enter text to translate");
    return;
  }
  updateStatus("loading","Translating...");
  try{
    let data = await apiCall("/api/translate",{text:text,language:language});
    if(!data) data = mockResponses.translate(text,language);
    
    updateStatus("success","✓ Translation complete");
    updateOutput(data);
  }catch(err){
    updateStatus("error","✗ Error: "+err.message);
    updateOutput({error:err.message});
  }
}

async function knowledgeQuery(){
  const query = document.getElementById("knowledgeInput").value;
  if(!query.trim()) {
    updateStatus("error","Please enter a question");
    return;
  }
  updateStatus("loading","Querying knowledge base...");
  try{
    let data = await apiCall("/api/knowledge/query",{query:query});
    if(!data) data = mockResponses.knowledge(query);
    
    updateStatus("success","✓ Query processed");
    updateOutput(data);
  }catch(err){
    updateStatus("error","✗ Error: "+err.message);
    updateOutput({error:err.message});
  }
}

async function systemStatus(){
  updateStatus("loading","Checking system status...");
  try{
    let data = await apiCall("/api/status",{});
    if(!data) data = mockResponses.status();
    
    updateStatus("success","✓ System is running");
    updateOutput(data);
  }catch(err){
    updateStatus("error","✗ Server check failed");
    updateOutput({error:"Using mock data - Server not available",services:mockResponses.status().services});
  }
}

// Helper Functions
function updateStatus(type,message){
  const box = document.getElementById("statusBox");
  box.className = "status "+type;
  box.textContent = message;
}

function updateOutput(data){
  document.getElementById("output").textContent = JSON.stringify(data,null,2);
}

// Initialize
document.addEventListener("DOMContentLoaded",()=>{
  updateStatus("success","✓ Dashboard ready");
});

</script>

</body>
</html>
